let lang="en";
let activeProf=null, activeShow=null;

const grid=document.getElementById('grid');
const qEl=document.getElementById('q');
const sortEl=document.getElementById('sort');
const countEl=document.getElementById('count');
const profChips=document.getElementById('profChips');
const showChips=document.getElementById('showChips');

const fmtDate=d=>new Date(d+'T00:00:00').toLocaleDateString(lang==='zh'?'zh-CN':'en-US',{year:'numeric',month:lang==='zh'?'long':'short',day:'numeric'});
const profLabel=p=>p==="Multiple Faculty"?UI[lang].allFaculty:p;

function buildChips(){
  profChips.innerHTML='';showChips.innerHTML='';
  [...new Set(EPISODES.map(e=>e.prof))].sort().forEach(p=>{
    const c=document.createElement('div');c.className='chip';c.textContent=profLabel(p);
    c.onclick=()=>{activeProf=activeProf===p?null:p;syncChips();render();};
    c.dataset.prof=p;profChips.appendChild(c);
  });
  [...new Set(EPISODES.map(e=>e.show))].sort().forEach(s=>{
    const c=document.createElement('div');c.className='chip';c.textContent=s;
    c.onclick=()=>{activeShow=activeShow===s?null:s;syncChips();render();};
    c.dataset.show=s;showChips.appendChild(c);
  });
  syncChips();
}
function syncChips(){
  profChips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.prof===activeProf));
  showChips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.show===activeShow));
}

function applyStaticText(){
  const u=UI[lang];
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  document.body.classList.toggle('zh',lang==='zh');
  document.getElementById('eyebrow').textContent=u.eyebrow;
  document.getElementById('h1').textContent=u.h1;
  document.getElementById('sub').textContent=u.sub;
  qEl.placeholder=u.search;
  sortEl.options[0].textContent=u.sortNew;
  sortEl.options[1].textContent=u.sortOld;
  sortEl.options[2].textContent=u.sortProf;
  document.getElementById('lblProf').textContent=u.lblProf;
  document.getElementById('lblShow').textContent=u.lblShow;
  document.getElementById('reset').textContent=u.reset;
  document.getElementById('footer').textContent=u.footer;
  document.getElementById('btnEn').classList.toggle('active',lang==='en');
  document.getElementById('btnZh').classList.toggle('active',lang==='zh');
}

function render(){
  const u=UI[lang];
  const q=qEl.value.trim().toLowerCase();
  let list=EPISODES.filter(e=>{
    if(activeProf&&e.prof!==activeProf)return false;
    if(activeShow&&e.show!==activeShow)return false;
    if(q){const blob=(e.prof+' '+e.title+' '+(e.title_zh||'')+' '+e.show+' '+e.desc+' '+(e.desc_zh||'')).toLowerCase();if(!blob.includes(q))return false;}
    return true;
  });
  const s=sortEl.value;
  list.sort((a,b)=> s==='old'?a.date.localeCompare(b.date)
    : s==='prof'?a.prof.localeCompare(b.prof)
    : b.date.localeCompare(a.date));

  countEl.textContent=u.count(list.length,EPISODES.length);
  grid.innerHTML='';
  if(!list.length){grid.innerHTML=`<div class="empty">${u.empty}</div>`;return;}
  list.forEach(e=>{
    const title=(lang==='zh'&&e.title_zh)?e.title_zh:e.title;
    const desc=(lang==='zh'&&e.desc_zh)?e.desc_zh:e.desc;
    const card=document.createElement('article');card.className='card';
    card.innerHTML=`
      <div class="top">
        <span class="show-tag">${e.show}</span>
        <span class="date">${fmtDate(e.date)}</span>
      </div>
      <h3>${title}</h3>
      <p class="prof"><span class="dot">●</span> ${profLabel(e.prof)}</p>
      <p class="desc">${desc}</p>
      <a class="listen" href="${e.url}" target="_blank" rel="noopener">
        ${u.listen}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
      </a>`;
    grid.appendChild(card);
  });
}

function setLang(l){lang=l;applyStaticText();buildChips();render();}

document.getElementById('reset').onclick=()=>{activeProf=null;activeShow=null;qEl.value='';sortEl.value='new';syncChips();render();};
qEl.oninput=render;sortEl.onchange=render;

setLang('en');
</script>
