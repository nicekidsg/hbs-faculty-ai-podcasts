name: Daily episode update

on:
  schedule:
    # 11:00 UTC daily = 6 AM US Eastern (EST) / 7 AM (EDT). GitHub cron is UTC only and does not follow DST.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # lets the built-in GITHUB_TOKEN push commits (no PAT/secret needed)

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Refresh episodes
        run: python scripts/update_episodes.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data.json index.html
            git commit -m "chore: daily episode refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes today."
          fi
